    <style id="theme-vars">
/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Brand palette updated to teal-cyan (inspired by Apple M-series marketing gradient).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand — teal-cyan (Apple M-series marketing gradient inspired) */
  --brand-50: #ecfeff;
  --brand-100: #cffafe;
  --brand-200: #a5f3fc;
  --brand-300: #67e8f9;
  --brand-400: #22d3ee;
  --brand-500: #06b6d4; /* @primary */
  --brand-600: #0891b2;
  --brand-700: #0e7490;
  --brand-800: #155e75;
  --brand-900: #164e63;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

    </style>

        mask-size: contain;

      /* ===== Blue Gradient Theme + Glassmorphism + Scroll Reveal ===== */
      body {

        --muted-foreground: #0e7490;
        --border: rgba(8, 145, 178, 0.2);
        --secondary: rgba(8, 145, 178, 0.08);
        --card: rgba(255, 255, 255, 0.6);
        background: linear-gradient(180deg, #a5d5ff 0%, #c0e3ff 15%, #d8eefa 30%, #e8f3fc 50%, #f2f8fd 70%, #f9fbfe 85%, #ffffff 100%);
        min-height: 100vh;
        font-family: 'Playfair Display', 'Times New Roman', Georgia, serif !important;
      }
      *, h1, h2, h3, h4, h5, h6, p, span, a, button, li, div, input, label {
        font-family: 'Playfair Display', 'Times New Roman', Georgia, serif !important;
      }
      h1 { font-weight: 700 !important; letter-spacing: -0.02em; }
      h2 { font-weight: 700 !important; letter-spacing: -0.01em; }
      h3 { font-weight: 600 !important; }
      p, li { font-weight: 400; line-height: 1.6; }

      /* Frosted Glass for all cards */
      [class*="rounded-"][class*="border"],
      [class*="rounded-"][style*="border"],
      [class*="rounded-"][style*="background:var(--card)"],
      [class*="rounded-"][style*="background:var(--secondary)"] {
        background: rgba(255, 255, 255, 0.55) !important;
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.45) !important;
        box-shadow: 0 8px 32px -8px rgba(8, 145, 178, 0.12), inset 0 1px 1px rgba(255, 255, 255, 0.5) !important;
      }
      [class*="rounded-"][class*="border-2"] {
        background: rgba(255, 255, 255, 0.65) !important;
        border: 1.5px solid rgba(255, 255, 255, 0.6) !important;
        box-shadow: 0 8px 32px -8px rgba(8, 145, 178, 0.18), inset 0 1px 1px rgba(255, 255, 255, 0.6) !important;
      }

      /* Glass buttons */
      a[style*="background:var(--foreground)"],
      button[style*="background:var(--foreground)"],
      a[style*="background:var(--primary)"],
      button[style*="background:var(--primary)"] {
        background: rgba(8, 145, 178, 0.75) !important;
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 4px 16px -4px rgba(8, 145, 178, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.25) !important;
      }

      /* Frosted nav */
      .frosted-nav, nav[style*="backdrop-filter"], nav[style*="saturate"] {
        background: rgba(255, 255, 255, 0.55) !important;
        backdrop-filter: saturate(180%) blur(20px) !important;
        -webkit-backdrop-filter: saturate(180%) blur(20px) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.4) !important;
      }

      /* Footer transparent */
      footer { background: transparent !important; }

      /* Deeper glass for issue cards */
      .rounded-xl[style*="background:var(--card)"],
      [class*="rounded-xl"][style*="border:1px solid var(--border)"] {
        background: rgba(255, 255, 255, 0.35) !important;
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.35) !important;
        box-shadow: 0 4px 20px -6px rgba(8, 145, 178, 0.1) !important;
      }

      /* Scroll Reveal */
      [data-reveal] {
        opacity: 0; transform: translateY(40px);
        transition: opacity 0.8s cubic-bezier(0.32, 0.72, 0, 1), transform 0.8s cubic-bezier(0.32, 0.72, 0, 1);
        will-change: opacity, transform;
      }
      [data-reveal].revealed { opacity: 1; transform: translateY(0); }
      [data-reveal-stagger] > * {
        opacity: 0; transform: translateY(30px);
        transition: opacity 0.7s cubic-bezier(0.32, 0.72, 0, 1), transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
      }
      [data-reveal-stagger].revealed > * { opacity: 1; transform: translateY(0); }
      [data-reveal-stagger].revealed > *:nth-child(1) { transition-delay: 0ms; }
      [data-reveal-stagger].revealed > *:nth-child(2) { transition-delay: 100ms; }
      [data-reveal-stagger].revealed > *:nth-child(3) { transition-delay: 200ms; }
      [data-reveal-stagger].revealed > *:nth-child(4) { transition-delay: 300ms; }
      [data-reveal-stagger].revealed > *:nth-child(5) { transition-delay: 400ms; }

      /* Smooth page transitions */
      html { scroll-behavior: smooth; }
      /* body transition handled by main animation */

      /* ===== CountUp animation ===== */
      .countup { display: inline-block; }

      /* ===== Dimension dots staggered pop-in ===== */
      .dim-card span.rounded-full {
        opacity: 0;
        transform: scale(0);
        transition: opacity 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .dim-card span.rounded-full.dim-visible {
        opacity: 1;
        transform: scale(1);
      }

      @media (prefers-reduced-motion: reduce) {
        [data-reveal], [data-reveal-stagger] > * { opacity: 1 !important; transform: none !important; transition: none !important; }
        .dim-card span.rounded-full { opacity: 1 !important; transform: none !important; transition: none !important; }
        body { animation: none !important; }
      }

      /* ===== Nav item glass texture (Apple frosted pill) ===== */
      nav.sticky a[class*="rounded-full"],
      nav.sticky span[class*="rounded-full"] {
        background: rgba(255, 255, 255, 0.2) !important;

      }
      nav.sticky a[class*="rounded-full"]:hover,
      nav.sticky span[class*="rounded-full"]:hover {
        background: rgba(255, 255, 255, 0.38) !important;
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.45), 0 2px 8px -2px rgba(8, 145, 178, 0.15) !important;
      }
      nav.sticky a[style*="color:var(--primary)"],
      nav.sticky a[data-active="true"] {
        background: rgba(8, 145, 178, 0.15) !important;
        border: 1px solid rgba(8, 145, 178, 0.25) !important;
      }

      /* ===== Enhanced Siri-style glass for all cards ===== */
      [class*="rounded-"][class*="border"],
      [class*="rounded-"][style*="border"],
      [class*="rounded-"][style*="background:var(--card)"],
      [class*="rounded-"][style*="background:var(--secondary)"] {
        background: rgba(255, 255, 255, 0.5) !important;
        backdrop-filter: blur(32px) saturate(200%);
        -webkit-backdrop-filter: blur(32px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.5) !important;
        box-shadow: 0 12px 40px -8px rgba(8, 145, 178, 0.18),
                    0 4px 12px -4px rgba(8, 145, 178, 0.1),
                    inset 0 1px 2px rgba(255, 255, 255, 0.6) !important;
      }

      /* ===== Page transition (smooth fade-up, GPU-accelerated) ===== */
      main {
        animation: pageSlideIn 0.35s cubic-bezier(0.32, 0.72, 0, 1) both;
        will-change: opacity, transform;
      }
      @keyframes pageSlideIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ===== Nav sliding indicator ===== */
      .nav-links-wrap { position: relative; }
      .nav-slider {
        position: absolute;
        height: 32px;
        border-radius: 9999px;
        background: rgba(8, 145, 178, 0.12);
        backdrop-filter: blur(12px) saturate(150%);
        -webkit-backdrop-filter: blur(12px) saturate(150%);
        border: 1px solid rgba(8, 145, 178, 0.2);
        transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1), width 0.45s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease;
        z-index: 0;
        pointer-events: none;
        top: 50%;
        left: 0;
        opacity: 0;
      }
    </style>
    <script>
      lucide.createIcons();
      (function () {
        var els = document.querySelectorAll('[data-reveal], [data-reveal-stagger]');
        if (!els.length) return;
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) { entry.target.classList.add('revealed'); observer.unobserve(entry.target); }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
        els.forEach(function (el) { observer.observe(el); });
      })();

      // ===== CountUp (vanilla JS, spring-based like react CountUp) =====
      (function () {
        var countEls = document.querySelectorAll('.countup');
        if (!countEls.length) return;

        function animateCount(el) {
          var to = parseFloat(el.getAttribute('data-to')) || 0;
          var duration = parseFloat(el.getAttribute('data-duration')) || 2;
          var start = 0;
          var startTime = null;

          // Spring-like easing: starts fast, decelerates smoothly
          var damping = 20 + 40 * (1 / duration);
          var stiffness = 100 * (1 / duration);

          function easeOutExpo(t) {
            return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
          }

          function step(timestamp) {
            if (!startTime) startTime = timestamp;
            var progress = Math.min((timestamp - startTime) / (duration * 1000), 1);
            var eased = easeOutExpo(progress);
            var current = Math.round(start + (to - start) * eased);
            el.textContent = current;
            if (progress < 1) {
              requestAnimationFrame(step);
            } else {
              el.textContent = to;
            }
          }

          requestAnimationFrame(step);
        }

        var countObserver = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              setTimeout(function () { animateCount(entry.target); }, 300);
              countObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.3 });

        countEls.forEach(function (el) { countObserver.observe(el); });
      })();

      // ===== Dimension dots staggered pop-in =====
      (function () {
        var card = document.querySelector('.dim-card');
        if (!card) return;
        var dots = card.querySelectorAll('span.rounded-full');
        if (!dots.length) return;

        function triggerDots() {
          dots.forEach(function (dot, i) {
            setTimeout(function () { dot.classList.add('dim-visible'); }, i * 70 + 400);
          });
        }

        var dotObserver = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) { triggerDots(); dotObserver.unobserve(entry.target); }
          });
        }, { threshold: 0.1 });
        dotObserver.observe(card);

        // safety net: if already in view on load
        var rect = card.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) {
          setTimeout(triggerDots, 800);
        }
      })();

      // ===== Nav sliding indicator =====
      (function () {
        var navWrap = document.querySelector('nav.sticky .flex.items-center.gap-1');
        if (!navWrap) return;
        navWrap.classList.add('nav-links-wrap');
        var slider = document.createElement('div');
        slider.className = 'nav-slider';
        navWrap.insertBefore(slider, navWrap.firstChild);

        var items = navWrap.querySelectorAll('a[data-nav-key], span[data-nav-key]');
        function findActive() {
          for (var i = 0; i < items.length; i++) {
            if (items[i].getAttribute('data-active') === 'true' ||
                (items[i].style && items[i].style.color === 'var(--primary)')) {
              return items[i];
            }
          }
          return null;
        }

        function moveSlider(item) {
          if (!item) { slider.style.opacity = '0'; return; }
          var r = item.getBoundingClientRect();
          var cr = navWrap.getBoundingClientRect();
          slider.style.width = r.width + 'px';
          slider.style.transform = 'translateY(-50%) translateX(' + (r.left - cr.left) + 'px)';
          slider.style.opacity = '1';
        }

        var active = findActive();
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { moveSlider(active); });
        });
        window.addEventListener('resize', function () { moveSlider(findActive()); });

        items.forEach(function (item) {
          item.addEventListener('click', function (e) {
            if (item.classList.contains('cursor-not-allowed')) return;
            e.preventDefault();
            moveSlider(item);
          });
        });
      })();
    </script>
